<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THRIFT BYTES | CONTACT</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="icon" href="thrift bytes.jpeg">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Montserrat", sans-serif;
}

body {
    background: #3B0A0A;
    color: #F8F4E3;
    overflow-x: hidden;
}

/* ================= NAVBAR ================= */

.navbar {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 6%;
    background: rgba(59, 10, 10, 0.95);
    backdrop-filter: blur(8px);
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    letter-spacing: 3px;
    color: #C6A75E;
}

.logo img {
    height: 40px;
}

.nav-links {
    display: flex;
    gap: 24px;
    align-items: center;
}

.nav-links a {
    text-decoration: none;
    color: #F8F4E3;
    font-size: 14px;
    transition: 0.3s ease;
}

.nav-links a:hover {
    color: #C6A75E;
}

.menu-toggle {
    display: none;
    font-size: 28px;
    cursor: pointer;
    color: #C6A75E;
}

/* Button Styled Anchor */

.btn-outline {
    padding: 10px 22px;
    border-radius: 28px;
    border: 1px solid #C6A75E;
    color: #C6A75E;
    background: transparent;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
}

.btn-outline:hover {
    background: #C6A75E;
    color: #3B0A0A !important;  /* force text color */
    border: 1px solid #C6A75E;
}

/* ================= CONTACT SECTION ================= */

.big-contact {
    padding: 100px 8%;
    text-align: center;
}

.big-contact h1 {
    font-size: 38px;
    margin-bottom: 15px;
}

.contact-subtitle {
    color: #d6cfc2;
    margin-bottom: 60px;
    font-size: 16px;
}

.contact-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 40px;
}

.contact-card {
    background: #4A1111;
    padding: 60px 30px;
    border-radius: 30px;
    text-decoration: none;
    color: #F8F4E3;
    transition: 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.contact-card:hover {
    transform: translateY(-8px);
    border: 1px solid #C6A75E;
}

.contact-card .icon {
    font-size: 55px;
    margin-bottom: 25px;
    color: #C6A75E;
}

.contact-card h3 {
    margin-bottom: 10px;
    font-size: 22px;
}

.contact-card p {
    color: #d6cfc2;
}

/* ================= MOBILE ================= */

@media (max-width: 900px) {

    .menu-toggle {
        display: block;
    }

    .nav-links {
        position: absolute;
        top: 75px;
        left: 0;
        width: 100%;
        background: #3B0A0A;
        flex-direction: column;
        gap: 20px;
        padding: 25px;
        display: none;
    }

    .nav-links.active {
        display: flex;
    }

    .contact-grid {
        grid-template-columns: 1fr;
    }

    .big-contact h1 {
        font-size: 28px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">
        <img src="thrift bytes.jpeg" alt="Logo">
        THRIFT BYTES
    </div>

    <div class="menu-toggle">&#9776;</div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="drops.html">Drops</a>
        <a href="contact.html">Contact</a>
        <a href="https://wa.me/917708655795" class="btn-outline">
            Message On WhatsApp
        </a>
    </div>
</nav>

<!-- CONTACT SECTION -->
<section class="big-contact">

    <h1>Let’s Connect</h1>
    <p class="contact-subtitle">
        Got questions? Want to grab a piece before it’s gone?
        Reach out to us instantly.
    </p>

    <div class="contact-grid">

        <a href="https://wa.me/917708655795" class="contact-card">
            <div class="icon">
                <i class="fab fa-whatsapp"></i>
            </div>
            <h3>Chat on WhatsApp</h3>
            <p>Quick replies. Direct orders.</p>
        </a>

        <a href="https://instagram.com/thriftbytes" class="contact-card">
            <div class="icon">
                <i class="fab fa-instagram"></i>
            </div>
            <h3>Follow on Instagram</h3>
            <p>See latest drops & updates.</p>
        </a>

    </div>

</section>

<script>
const toggle = document.querySelector(".menu-toggle");
const navLinks = document.querySelector(".nav-links");

toggle.addEventListener("click", () => {
    navLinks.classList.toggle("active");
});
</script>

</body>
</html>
